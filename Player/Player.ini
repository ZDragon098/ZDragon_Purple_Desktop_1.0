[Rainmeter]
Update=10
Author=Connect-R
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
; Increased width and height to accommodate the horizontal layout
SkinWidth=400
SkinHeight=300

[Variables]
@include=#@#Variables.inc
AverageSize=6
Size=3.1
Space=6
BarWidth=10
BarMaxLen=200
; Color fallback if Variables.inc is missing
Color1=210,168,199,255
Color2=255,255,255,255

_______________________________________________________________________

[MeasureAudioOutput]
Measure=Plugin
Plugin=AudioLevel
Port=Output
FFTSize=1024
FFTOverlap=512
FFTAttack=0
FFTDecay=100
FreqMin=30
FreqMax=16500
Sensitivity=32
Bands=10

[MeasurePlayer]
Measure=Plugin
Plugin=NowPlaying.dll
PlayerName=#Player#
PlayerType=TITLE

[MeasureArtist]
Measure=Plugin
Plugin=NowPlaying.dll
Parent=MeasurePlayer
PlayerType=ARTIST

_______________________________________________________________________

[MeasureAudio1]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudioOutput
Type=Band
BandIdx=1
AverageSize=#AverageSize#

[MeasureAudio2]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudioOutput
Type=Band
BandIdx=2
AverageSize=#AverageSize#

[MeasureAudio3]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudioOutput
Type=Band
BandIdx=3
AverageSize=#AverageSize#

[MeasureAudio4]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudioOutput
Type=Band
BandIdx=4
AverageSize=#AverageSize#

[MeasureAudio5]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudioOutput
Type=Band
BandIdx=5
AverageSize=#AverageSize#

[MeasureAudio6]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudioOutput
Type=Band
BandIdx=6
AverageSize=#AverageSize#

[MeasureAudio7]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudioOutput
Type=Band
BandIdx=7
AverageSize=#AverageSize#

[MeasureAudio8]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudioOutput
Type=Band
BandIdx=8
AverageSize=#AverageSize#

_______________________________________________________________________

[StyleBar]
; This style handles the vertical spacing for the horizontal bars
X=0
Y=#Space#R
DynamicVariables=1

[MeterBar1]
Meter=Shape
X=0
Y=50
; Rectangle X, Y, Width, Height, CornerRadius
Shape=Rectangle 0, 0, (#BarMaxLen#*[MeasureAudio1]+5), #BarWidth#, (#BarWidth#/2) | Fill Color #Color1# | StrokeWidth 0
DynamicVariables=1

[MeterBar2]
Meter=Shape
MeterStyle=StyleBar
Shape=Rectangle 0, 0, (#BarMaxLen#*[MeasureAudio2]+5), #BarWidth#, (#BarWidth#/2) | Fill Color #Color2# | StrokeWidth 0

[MeterBar3]
Meter=Shape
MeterStyle=StyleBar
Shape=Rectangle 0, 0, (#BarMaxLen#*[MeasureAudio3]+5), #BarWidth#, (#BarWidth#/2) | Fill Color #Color1# | StrokeWidth 0

[MeterBar4]
Meter=Shape
MeterStyle=StyleBar
Shape=Rectangle 0, 0, (#BarMaxLen#*[MeasureAudio4]+5), #BarWidth#, (#BarWidth#/2) | Fill Color #Color2# | StrokeWidth 0

[MeterBar5]
Meter=Shape
MeterStyle=StyleBar
Shape=Rectangle 0, 0, (#BarMaxLen#*[MeasureAudio5]+5), #BarWidth#, (#BarWidth#/2) | Fill Color #Color1# | StrokeWidth 0

[MeterBar6]
Meter=Shape
MeterStyle=StyleBar
Shape=Rectangle 0, 0, (#BarMaxLen#*[MeasureAudio6]+5), #BarWidth#, (#BarWidth#/2) | Fill Color #Color2# | StrokeWidth 0

[MeterBar7]
Meter=Shape
MeterStyle=StyleBar
Shape=Rectangle 0, 0, (#BarMaxLen#*[MeasureAudio7]+5), #BarWidth#, (#BarWidth#/2) | Fill Color #Color1# | StrokeWidth 0

[MeterBar8]
Meter=Shape
MeterStyle=StyleBar
Shape=Rectangle 0, 0, (#BarMaxLen#*[MeasureAudio8]+5), #BarWidth#, (#BarWidth#/2) | Fill Color #Color2# | StrokeWidth 0

_______________________________________________________________________

[MeterArtistInfo]
Meter=String
MeasureName=MeasureArtist
FontColor=255,255,255,255
FontFace=Work Sans SemiBold
FontSize=16
X=0
Y=10
Text="%1"
AntiAlias=1